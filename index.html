<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Sales Tracker</title>
  <link rel="stylesheet" href="/src/style.css">
  <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
<body>
  <div class="container">
    <header>
      <h1>SEMBROLI</h1>
      <div style="display: flex; gap: 1rem;">
        <button id="addSaleBtn" class="btn-primary">+ Add Sale</button>
        <button id="extractDocBtn" class="btn-primary">📄 Extract Document</button>
      </div>
    </header>

    <div class="content-grid">
      <!-- Sales Table Section -->
      <section class="card sales-section">
        <h2>Recent Sales</h2>

        <!-- Filter Controls -->
        <div class="filter-controls">
          <div class="filter-group">
            <label for="filterDate">Filter by Date:</label>
            <input type="date" id="filterDate">
          </div>
          <div class="filter-group">
            <label for="filterItem">Filter by Item:</label>
            <select id="filterItem">
              <option value="">All Items</option>
            </select>
          </div>
          <button id="resetFiltersBtn" class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Reset Filters</button>
        </div>

        <div class="table-container">
          <table id="salesTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Buyer Name</th>
                <th>Items Purchased</th>
                <th>Shipping</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="salesTableBody">
              <tr>
                <td colspan="5" class="loading">Loading sales...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

<section class="card chart-section">
        <h2>Items Sold Summary</h2>
        <div class="table-container">
          <table id="popularItemsTable">
            <thead>
              <tr>
                <th>Item Name</th>
                <th>Total Sold</th>
              </tr>
            </thead>
            <tbody id="popularItemsTableBody">
              <tr>
                <td colspan="2" class="loading">Loading data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <!-- Modal for Document Extraction -->
  <div id="extractModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Extract Document Data</h2>
        <button class="close-btn" id="closeExtractModal">&times;</button>
      </div>
      <form id="extractForm">
        <div class="form-group">
          <label for="documentImage">Upload Document (PDF or Image)</label>
          <input type="file" id="documentImage" accept=".pdf,image/*" required>
        </div>
        <div id="extractPreview" style="margin: 1rem 0;"></div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelExtractBtn">Cancel</button>
          <button type="submit" class="btn-primary">Extract Data</button>
        </div>
      </form>
      <div id="extractResults" style="margin-top: 1.5rem; display: none;">
        <h3>Extracted Data</h3>
        <pre id="resultsJson" style="background: #f5f5f5; padding: 1rem; border-radius: 0.5rem; overflow-x: auto;"></pre>
        <button id="populateSaleBtn" class="btn-primary" style="margin-top: 1rem;">Populate Sale Form</button>
      </div>
    </div>
  </div>

  <!-- Modal for Add/Edit Sale -->
  <div id="saleModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Sale</h2>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <form id="saleForm">
        <div class="form-group">
          <label for="buyerName">Buyer Name</label>
          <input type="text" id="buyerName" required>
        </div>

        <div class="form-group">
          <label for="saleDate">Sale Date</label>
          <input type="date" id="saleDate" required>
        </div>

        <div class="form-group">
          <label for="shipping">Shipping Method</label>
          <select id="shipping" required>
            <option value="SPX">SPX</option>
            <option value="J&T">J&T</option>
            <option value="JNE">JNE</option>
          </select>
        </div>

        <div class="form-section">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <label style="margin: 0;">Items Purchased</label>
            <button type="button" class="btn-secondary" id="addItemBtn" style="padding: 0.5rem 1rem; font-size: 0.875rem;">+ Add Item</button>
          </div>
          <div id="itemsContainer"></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-primary">Save Sale</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
